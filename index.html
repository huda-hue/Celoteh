<!doctype html>
<html>
	<head>
		<title>Celoteh.com</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	</head>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			font-family: "Lucida Sans", sans-serif;
		}

		.grid-container {
			display: grid;
			grid-template-areas:
				"header"
				"menu"
				"content"
				"footer";
			background-color: white;
			gap: 10px;
		}

		.header {
			grid-area: header;
			background-color: #0099cc;
			border-radius: 8px;
			text-align: center;
			color: #ffffff;
			margin-bottom: 10px;
		}

		.header > h1 {
			font-size: 40px;
		}

		.menu {
			grid-area: menu;
		}

		.menu ul {
			list-style-type: none;
			margin: 0;
			padding: 0;
		}

		.menu li {
			padding: 8px;
			margin-bottom: 7px;
			background-color: #33b5e5;
			border-radius: 8px;
			color: #ffffff;
		}

		.menu li:hover {
			background-color: #0099cc;
		}

		#content {
			grid-area: content;
		}

		#content > h1,
		#content > h5,
		#content > p {
			margin-bottom: 7px;
		}

		#content > li:hover {
			text-decoration: underline;
		}

		.footer {
			grid-area: footer;
			background-color: #0099cc;
			color: #ffffff;
			text-align: center;
			border-radius: 8px;
			margin-top: 10px;
		}

		@media (min-width: 600px) {
			.header {
				grid-area: 1 / span 6;
			}
			.menu {
				grid-area: 2 / span 1;
			}
			#content {
				grid-area: 2 / span 4;
			}
			.footer {
				grid-area: 3 / span 6;
			}
		}

		@media (min-width: 768px) {
			.header {
				grid-area: 1 / span 6;
			}
			.menu {
				grid-area: 2 / span 1;
			}
			#content {
				grid-area: 2 / span 5;
			}
			.footer {
				grid-area: 3 / span 6;
			}
		}
	</style>
	<script>
		function loadContent(file) {
			let content = document.getElementById("content");
			content.innerHTML = "<p>Loading...</p>";
			fetch(file)
				.then((response) => response.text())
				.then((data) => {
					document.getElementById("content").innerHTML = data;
				})
				.catch((error) => {
					document.getElementById("content").innerHTML =
						"<p>Konten gagal dimuat.</p>";
					console.error(error);
				});
		}
	</script>
	<body>
		<div class="grid-container">
			<div class="header">
				<h1>Celoteh</h1>
			</div>
			<div class="menu">
				<ul>
					<li onclick="loadContent('tentang.html')">Tentang</li>
					<li onclick="loadContent('review_buku.html')">
						Review Buku
					</li>
					<li>Ngobrol Matematika</li>
					<li>Imajinasi</li>
				</ul>
			</div>
			<div id="content">
				<p>Pilih Topik</p>
			</div>
			<div class="footer">
				<p>Copyright @2026</p>
			</div>
		</div>
	</body>
</html>
